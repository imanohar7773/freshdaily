<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh Daily — Farm to Doorstep</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --green-deep: #0f2d1a;
  --green-mid: #1b4d30;
  --green-bright: #2d7a4f;
  --green-light: #4caf7d;
  --green-pale: #e8f5ee;
  --amber: #f4a228;
  --amber-light: #ffecc8;
  --cream: #faf8f3;
  --white: #ffffff;
  --text-dark: #0f1a14;
  --text-mid: #3d5a47;
  --text-muted: #8aaa96;
  --border: #d9ead3;
  --red: #e84545;
  --shadow-sm: 0 2px 8px rgba(15,45,26,0.08);
  --shadow-md: 0 8px 24px rgba(15,45,26,0.12);
  --shadow-lg: 0 20px 60px rgba(15,45,26,0.18);
  --radius: 16px;
  --radius-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--text-dark);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ===== HERO HEADER ===== */
.hero {
  background: var(--green-deep);
  position: relative;
  overflow: hidden;
  padding: 0 0 24px;
}

.hero::before {
  content: '';
  position: absolute;
  top: -60px; right: -80px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(76,175,125,0.18) 0%, transparent 70%);
  border-radius: 50%;
}

.hero::after {
  content: '';
  position: absolute;
  bottom: -40px; left: -60px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(244,162,40,0.12) 0%, transparent 70%);
  border-radius: 50%;
}

/* Ticker */
.ticker-wrap {
  background: var(--amber);
  overflow: hidden;
  white-space: nowrap;
  padding: 7px 0;
}

.ticker-inner {
  display: inline-block;
  animation: ticker 28s linear infinite;
}

.ticker-inner span {
  font-size: 11px;
  font-weight: 700;
  color: var(--green-deep);
  letter-spacing: 0.5px;
  padding: 0 32px;
}

@keyframes ticker {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Logo area */
.hero-content {
  padding: 20px 20px 0;
  position: relative;
  z-index: 2;
}

.logo-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.logo-block h1 {
  font-family: 'Playfair Display', serif;
  font-size: 32px;
  font-weight: 900;
  color: var(--white);
  letter-spacing: -0.5px;
  line-height: 1;
}

.logo-block h1 span { color: var(--amber); }

.logo-block p {
  font-size: 9px;
  font-weight: 600;
  color: var(--green-light);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-top: 3px;
}

.live-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(76,175,125,0.15);
  border: 1px solid rgba(76,175,125,0.3);
  border-radius: 20px;
  padding: 6px 12px;
}

.live-dot {
  width: 7px; height: 7px;
  background: #4cff8d;
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(0.8); }
}

.live-badge span {
  font-size: 10px;
  font-weight: 700;
  color: #4cff8d;
  letter-spacing: 1px;
}

/* Stats cards */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 16px;
}

.stat-card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  padding: 12px 10px;
  text-align: center;
  backdrop-filter: blur(10px);
}

.stat-card .num {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--amber);
  line-height: 1;
}

.stat-card .lbl {
  font-size: 9px;
  font-weight: 600;
  color: var(--green-light);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 3px;
}

/* ===== PROMO BANNER ===== */
.promo-banner {
  margin: 16px 16px 0;
  background: linear-gradient(135deg, #f4a228 0%, #e8850a 100%);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-md);
}

.promo-banner::before {
  content: '🎁';
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 48px;
  opacity: 0.2;
}

.promo-banner .ptitle {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--green-deep);
  line-height: 1.2;
}

.promo-banner .psub {
  font-size: 11px;
  font-weight: 500;
  color: rgba(15,45,26,0.7);
  margin-top: 3px;
}

.promo-tag {
  background: var(--green-deep);
  color: var(--amber);
  font-size: 10px;
  font-weight: 800;
  padding: 5px 10px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

/* ===== DELIVERY INFO STRIP ===== */
.delivery-strip {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.delivery-strip::-webkit-scrollbar { display: none; }

.dchip {
  display: flex;
  align-items: center;
  gap: 6px;
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 12px;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
}

.dchip .icon { font-size: 14px; }
.dchip .text { font-size: 11px; font-weight: 600; color: var(--green-mid); }

/* ===== SEARCH ===== */
.search-section {
  padding: 0 16px 12px;
}

.search-box {
  position: relative;
}

.search-box input {
  width: 100%;
  padding: 13px 18px 13px 46px;
  border: 2px solid var(--border);
  border-radius: 50px;
  font-size: 14px;
  font-family: 'DM Sans', sans-serif;
  background: var(--white);
  color: var(--text-dark);
  outline: none;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}

.search-box input:focus {
  border-color: var(--green-bright);
  box-shadow: 0 0 0 4px rgba(45,122,79,0.1), var(--shadow-sm);
}

.search-box input::placeholder { color: var(--text-muted); }

.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 16px;
  pointer-events: none;
}

/* Filter pills */
.filter-row {
  display: flex;
  gap: 8px;
  padding: 0 16px 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }

.fpill {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 14px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--white);
  font-size: 12px;
  font-weight: 600;
  color: var(--text-mid);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

.fpill.active {
  background: var(--green-mid);
  border-color: var(--green-mid);
  color: var(--white);
}

/* ===== SECTION HEADER ===== */
.section-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px 6px;
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--cream);
}

.section-header::before {
  content: '';
  display: block;
  width: 4px;
  height: 20px;
  background: var(--amber);
  border-radius: 2px;
  flex-shrink: 0;
}

.section-header .sh-text {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--green-deep);
  flex: 1;
}

.section-header .sh-count {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-muted);
  background: var(--green-pale);
  padding: 3px 9px;
  border-radius: 20px;
}

/* ===== ITEM CARD ===== */
.item-card {
  background: var(--white);
  margin: 4px 12px;
  border-radius: var(--radius);
  padding: 14px 14px;
  display: flex;
  align-items: flex-start;
  gap: 12px;
  box-shadow: var(--shadow-sm);
  border: 1px solid rgba(217,234,211,0.6);
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}

.item-card:active { transform: scale(0.99); }

.item-card.in-cart {
  border-color: var(--green-bright);
  background: linear-gradient(135deg, #fff 0%, #f0faf5 100%);
}

/* Item icon */
.item-emoji {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  background: var(--green-pale);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  flex-shrink: 0;
  overflow: hidden;
}
.item-emoji.svg-icon {
  padding: 6px;
}
.item-emoji.svg-icon svg {
  width: 100%;
  height: 100%;
}

.item-body { flex: 1; min-width: 0; }

.item-name {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-dark);
  line-height: 1.3;
}

.item-badges {
  display: flex;
  gap: 4px;
  margin-top: 4px;
  flex-wrap: wrap;
}

.badge {
  font-size: 9px;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 4px;
  letter-spacing: 0.3px;
}

.badge-organic { background: #e8f5ee; color: #1b7a3f; }
.badge-hot { background: #fff0e8; color: #c04a00; }
.badge-fresh { background: #e8f0ff; color: #2a50c0; }
.badge-best { background: var(--amber-light); color: #a06200; }

/* Weight tabs */
.weight-tabs {
  display: flex;
  gap: 5px;
  margin-top: 8px;
}

.wtab {
  padding: 4px 10px;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  background: var(--white);
  color: var(--text-mid);
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}

.wtab.active {
  background: var(--green-mid);
  border-color: var(--green-mid);
  color: var(--white);
}

/* Pricing */
.price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-top: 6px;
}

.price-mrp {
  font-size: 11px;
  color: var(--text-muted);
  text-decoration: line-through;
}

.price-sp {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--green-mid);
}

.price-unit {
  font-size: 10px;
  color: var(--text-muted);
}

.discount-tag {
  font-size: 9px;
  font-weight: 800;
  color: var(--red);
  background: #fff0f0;
  padding: 2px 6px;
  border-radius: 4px;
  margin-left: 2px;
}

/* Add to cart button area */
.item-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
  flex-shrink: 0;
}

/* Add button */
.add-btn {
  width: 36px;
  height: 36px;
  border-radius: 12px;
  background: var(--green-mid);
  border: none;
  color: var(--white);
  font-size: 20px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(27,77,48,0.3);
  transition: all 0.15s;
}

.add-btn:active { transform: scale(0.9); }

/* Qty stepper */
.qty-stepper {
  display: flex;
  align-items: center;
  gap: 0;
  background: var(--green-pale);
  border-radius: 12px;
  overflow: hidden;
  border: 1.5px solid var(--green-light);
}

.qty-stepper button {
  width: 32px;
  height: 32px;
  border: none;
  background: transparent;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  color: var(--green-mid);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.15s;
}

.qty-stepper button:active { background: rgba(45,122,79,0.15); }

.qty-stepper .qty-num {
  min-width: 28px;
  text-align: center;
  font-size: 14px;
  font-weight: 800;
  color: var(--green-deep);
  font-family: 'Playfair Display', serif;
}

/* Cart total on item */
.item-subtotal {
  font-size: 10px;
  font-weight: 700;
  color: var(--green-bright);
}

/* ===== SECTION DIVIDER ===== */
.section-divider {
  height: 10px;
  background: var(--cream);
}

/* ===== CART PANEL ===== */
.cart-panel {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
}

/* Collapsed bar */
.cart-bar {
  background: var(--green-deep);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  cursor: pointer;
  transition: all 0.3s;
}

.cart-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.cart-icon-wrap {
  position: relative;
}

.cart-icon {
  font-size: 22px;
}

.cart-badge {
  position: absolute;
  top: -6px;
  right: -8px;
  background: var(--red);
  color: white;
  font-size: 9px;
  font-weight: 800;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  display: none;
}

.cart-info-text .ct { font-size: 11px; color: var(--green-light); font-weight: 500; }
.cart-info-text .cv {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--amber);
  line-height: 1;
}

.cart-actions { display: flex; gap: 8px; align-items: center; }

.expand-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--white);
  font-size: 11px;
  font-weight: 600;
  padding: 7px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}

.wa-btn {
  background: #25d366;
  color: var(--white);
  border: none;
  padding: 10px 16px;
  border-radius: 24px;
  font-size: 13px;
  font-weight: 800;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  box-shadow: 0 4px 12px rgba(37,211,102,0.4);
  transition: all 0.2s;
}

.wa-btn:active { transform: scale(0.97); }

/* Expanded cart drawer */
.cart-drawer {
  background: var(--white);
  border-top: 1px solid var(--border);
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.cart-drawer.open {
  max-height: 65vh;
  overflow-y: auto;
}

.drawer-header {
  padding: 16px 16px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}

.drawer-title {
  font-family: 'Playfair Display', serif;
  font-size: 17px;
  font-weight: 700;
  color: var(--text-dark);
}

.clear-btn {
  font-size: 12px;
  font-weight: 600;
  color: var(--red);
  background: #fff0f0;
  border: none;
  padding: 5px 12px;
  border-radius: 20px;
  cursor: pointer;
}

.cart-item-row {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--green-pale);
  gap: 10px;
}

.ci-name {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-dark);
}

.ci-detail {
  font-size: 10px;
  font-weight: 500;
  color: var(--text-muted);
  margin-top: 1px;
}

.ci-price {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--green-mid);
}

/* Bill summary */
.bill-summary {
  padding: 14px 16px;
  background: var(--green-pale);
  margin: 0 12px 12px;
  border-radius: var(--radius-sm);
}

.bill-row {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-mid);
  margin-bottom: 6px;
}

.bill-row.total {
  font-size: 15px;
  font-weight: 800;
  color: var(--green-deep);
  padding-top: 8px;
  border-top: 1px dashed var(--border);
  margin-top: 6px;
  margin-bottom: 0;
}

.bill-row.savings {
  color: var(--green-bright);
  font-weight: 700;
}

.free-delivery-bar {
  background: var(--amber-light);
  border-radius: 8px;
  padding: 8px 12px;
  margin: 8px 12px 4px;
  font-size: 11px;
  font-weight: 600;
  color: #7a5000;
}

.free-delivery-progress {
  height: 4px;
  background: rgba(0,0,0,0.1);
  border-radius: 2px;
  margin-top: 6px;
  overflow: hidden;
}

.fdp-fill {
  height: 100%;
  background: var(--amber);
  border-radius: 2px;
  transition: width 0.4s;
}

/* ===== EMPTY STATE ===== */
.empty-state {
  padding: 60px 30px;
  text-align: center;
}

.empty-state .emoji { font-size: 56px; margin-bottom: 12px; }
.empty-state h3 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--text-dark);
  margin-bottom: 6px;
}
.empty-state p { font-size: 13px; color: var(--text-muted); }

/* No results */
.no-results {
  padding: 40px;
  text-align: center;
  color: var(--text-muted);
  font-size: 14px;
}

/* Bottom spacer */
.bottom-spacer { height: 100px; }

/* ===== ANIMATIONS ===== */
@keyframes slideUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.item-card { /* animation only applied via JS class */ }
.item-card.animate-in { animation: slideUp 0.25s ease both; }

/* ===== ADD TO CART ANIMATION ===== */
@keyframes cartPop {
  0%   { transform: scale(1); }
  30%  { transform: scale(1.06); box-shadow: 0 0 0 4px rgba(76,175,125,0.25); }
  60%  { transform: scale(0.97); }
  100% { transform: scale(1); box-shadow: none; }
}
@keyframes ripple {
  0%   { transform: scale(0); opacity: 0.6; }
  100% { transform: scale(4); opacity: 0; }
}
.item-card.cart-added {
  animation: cartPop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
}
.add-ripple {
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 50%;
  background: rgba(76,175,125,0.4);
  pointer-events: none;
  animation: ripple 0.5s ease-out both;
  transform-origin: center;
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--green-deep);
  color: var(--white);
  padding: 10px 20px;
  border-radius: 50px;
  font-size: 12px;
  font-weight: 600;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
  z-index: 200;
  box-shadow: var(--shadow-md);
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== OFFERS CAROUSEL ===== */
.offers-section {
  padding: 12px 0 4px;
}

.offers-title {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--text-dark);
  padding: 0 16px 10px;
}

.offers-scroll {
  display: flex;
  gap: 10px;
  padding: 0 16px;
  overflow-x: auto;
  scrollbar-width: none;
}
.offers-scroll::-webkit-scrollbar { display: none; }

.offer-card {
  flex-shrink: 0;
  width: 200px;
  border-radius: var(--radius);
  padding: 14px 14px;
  position: relative;
  overflow: hidden;
}

.offer-card.oc1 { background: linear-gradient(135deg, #0f2d1a, #1b4d30); }
.offer-card.oc2 { background: linear-gradient(135deg, #7a3800, #c06010); }
.offer-card.oc3 { background: linear-gradient(135deg, #1a1060, #3030a0); }

.offer-card .ot {
  font-family: 'Playfair Display', serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--white);
  line-height: 1.2;
}

.offer-card .os {
  font-size: 10px;
  color: rgba(255,255,255,0.7);
